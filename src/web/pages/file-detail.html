<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>웹하드 파일 상세</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/assets/css/webhard.css">
</head>
<body>
  <header class="topbar">
    <strong>웹하드</strong>
    <nav>
      <a href="/upload.html">업로드</a>
      <a href="/dashboard.html">현황</a>
      <a class="active" href="/preview.html">미리보기</a>
      <a href="/search.html">검색</a>
      <a href="/download-jobs.html">다운로드</a>
      <a href="/trash.html">휴지통</a>
      <a href="/shares.html" data-permission="share">공유</a>
      <a href="/audit.html">기록</a>
      <a href="/indexing.html">인덱싱</a>
    </nav>
  </header>
  <main class="shell">
    <section class="panel toolbar">
      <button id="backButton" class="btn" type="button">뒤로</button>
      <a id="downloadFile" class="btn primary" href="#">다운로드</a>
    </section>
    <section class="panel file-detail">
      <h1 id="fileName">파일 상세</h1>
      <div id="fileViewer" class="file-viewer"></div>
      <dl class="status-list">
        <div>
          <dt>종류</dt>
          <dd id="fileKind">-</dd>
        </div>
        <div>
          <dt>크기</dt>
          <dd id="fileSize">-</dd>
        </div>
        <div>
          <dt>원본 생성일</dt>
          <dd id="fileCreatedAt">-</dd>
        </div>
        <div>
          <dt>해시</dt>
          <dd id="fileHash">-</dd>
        </div>
      </dl>
      <div class="management-grid">
        <form id="metadataForm" class="panel" data-permission="write">
          <h2>표시 정보</h2>
          <label>파일명<input id="editFileName" class="input" type="text"></label>
          <label>표시명<input id="displayName" class="input" type="text"></label>
          <label>메모<textarea id="fileMemo" class="input" rows="3"></textarea></label>
          <label>태그<input id="fileTags" class="input" type="text" placeholder="쉼표로 구분"></label>
          <button class="btn primary" type="submit">저장</button>
        </form>
        <form id="moveForm" class="panel" data-permission="write">
          <h2>위치 이동</h2>
          <label>대상 폴더 ID<select id="targetFolderId" class="input">
              <option value="">루트</option>
            </select></label>
          <button class="btn" type="submit">이동</button>
        </form>
        <form id="shareForm" class="panel" data-permission="share">
          <h2>공유 링크</h2>
          <label>만료일시<input id="shareExpiresAt" class="input" type="datetime-local"></label>
          <label>비밀번호<input id="sharePassword" class="input" type="password"></label>
          <label>다운로드 제한<input id="shareMaxDownloads" class="input" type="number" min="1" placeholder="제한 없음"></label>
          <button class="btn" type="submit">공유 생성</button>
          <div id="shareResult" class="summary"></div>
        </form>
      </div>
      <section class="panel">
        <h2>중복 파일</h2>
        <div id="duplicateList" class="stat-list"></div>
      </section>
      <div id="message" class="message"></div>
    </section>
  </main>
  <script src="/assets/js/webhard.js"></script>
  <script src="/assets/js/file-detail.js"></script>
</body>
</html>
