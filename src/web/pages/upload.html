<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>웹하드 업로드</title>
  <link rel="stylesheet" href="/assets/css/webhard.css">
</head>
<body>
  <header class="topbar">
    <strong>웹하드</strong>
    <nav>
      <a class="active" href="/upload.html">업로드</a>
      <a href="/preview.html">미리보기</a>
      <a href="/indexing.html">인덱싱</a>
    </nav>
  </header>
  <main class="shell">
    <section class="panel">
      <h1>파일 업로드</h1>
      <form id="uploadForm" class="form-grid">
        <label>
          폴더 ID
          <input id="folderId" class="input" type="number" min="1" placeholder="선택">
        </label>
        <div id="uploadLimitText" class="upload-limit-text">
          단일 파일 100MB 이하, 전체 500MB 이하
        </div>
        <label id="dropZone" class="drop-zone wide">
          <input id="file" type="file" accept="image/*,video/*,.pdf,.xls,.xlsx,.csv,.ods,.doc,.docx,.ppt,.pptx,.txt,.md,.rtf,.hwp,.hwpx" multiple>
          <span class="drop-title">파일을 끌어오거나 클릭해서 선택</span>
          <span class="drop-subtitle">사진, 동영상, PDF, Excel 등 문서 파일을 여러 개 업로드할 수 있습니다.</span>
        </label>
        <div id="fileList" class="upload-list wide"></div>
        <div class="actions wide">
          <button class="btn primary" type="submit">업로드</button>
          <button id="clearFiles" class="btn" type="button">비우기</button>
          <a class="btn" href="/preview.html">미리보기로 이동</a>
        </div>
      </form>
      <div id="message" class="message"></div>
    </section>
  </main>
  <script src="/assets/js/webhard.js"></script>
  <script src="/assets/js/upload.js"></script>
</body>
</html>
