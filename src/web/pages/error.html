<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>웹하드 오류</title>
  <style>
    :root {
      --bg: #eef3f7;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --line: #d8e0ea;
      --primary: #2563eb;
      --danger: #be123c;
      --danger-bg: #fff1f2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.10), transparent 34rem),
        linear-gradient(135deg, #f8fafc 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Malgun Gothic", Arial, sans-serif;
    }

    .error-card {
      width: min(560px, 100%);
      padding: 36px 32px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--card);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.14);
      text-align: center;
    }

    .error-code {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 92px;
      height: 38px;
      margin-bottom: 18px;
      padding: 0 18px;
      border-radius: 999px;
      background: var(--danger-bg);
      color: var(--danger);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.06em;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.25;
    }

    p {
      margin: 0 auto 28px;
      max-width: 440px;
      line-height: 1.7;
      color: var(--muted);
      word-break: keep-all;
    }

    .error-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .error-actions a,
    .error-actions button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 112px;
      height: 42px;
      padding: 0 18px;
      border: 1px solid #cbd5e1;
      border-radius: 11px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }

    .error-actions .primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    @media (max-width: 520px) {
      .error-card {
        padding: 28px 20px;
        border-radius: 18px;
      }

      .error-actions {
        flex-direction: column;
      }

      .error-actions a,
      .error-actions button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
<main class="error-card">
  <div id="errorCode" class="error-code">ERROR</div>
  <h1 id="errorTitle">요청을 처리할 수 없습니다</h1>
  <p id="errorMessage">잠시 후 다시 시도하거나 관리자에게 문의하세요.</p>
  <div class="error-actions">
    <a class="primary" href="/preview.html">미리보기로 이동</a>
    <button type="button" onclick="history.back()">이전 화면</button>
  </div>
</main>
<script>
  (function () {
    var titles = {
      "401": "로그인이 필요합니다",
      "403": "권한이 없습니다",
      "404": "파일 또는 화면을 찾을 수 없습니다",
      "500": "요청을 처리할 수 없습니다"
    };
    var messages = {
      "401": "웹하드에 다시 로그인한 뒤 이용하세요.",
      "403": "관리자에게 웹하드 접근 권한 설정을 요청하세요.",
      "404": "요청한 파일이나 화면이 없거나 삭제되었습니다.",
      "500": "잠시 후 다시 시도하거나 관리자에게 문의하세요."
    };
    var params = new URLSearchParams(location.search || "");
    var code = params.get("code") || window.WEBHARD_ERROR_CODE || "ERROR";
    var message = params.get("message") || window.WEBHARD_ERROR_MESSAGE || messages[code] || messages["500"];

    document.getElementById("errorCode").textContent = code;
    document.getElementById("errorTitle").textContent = titles[code] || titles["500"];
    document.getElementById("errorMessage").textContent = message;
  })();
</script>
</body>
</html>
