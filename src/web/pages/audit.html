<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>웹하드 감사 로그</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/assets/css/webhard.css">
</head>
<body>
  <header class="topbar">
    <strong>웹하드</strong>
    <nav>
      <a href="/upload.html">업로드</a>
      <a href="/dashboard.html">현황</a>
      <a href="/preview.html">미리보기</a>
      <a href="/search.html">검색</a>
      <a href="/download-jobs.html">다운로드</a>
      <a href="/trash.html">휴지통</a>
      <a href="/shares.html" data-permission="share">공유</a>
      <a class="active" href="/audit.html">기록</a>
      <a href="/indexing.html">인덱싱</a>
    </nav>
  </header>
  <main class="shell">
    <section class="panel feed-head">
      <h1>감사 로그</h1>
      <label>
        시작일
        <input id="dateFrom" class="input" type="date">
      </label>
      <label>
        종료일
        <input id="dateTo" class="input" type="date">
      </label>
      <label>
        액션
        <select id="actionFilter" class="input">
          <option value="">전체</option>
          <option value="FILE_UPLOAD">파일 업로드</option>
          <option value="FILE_DELETE">파일 삭제</option>
          <option value="FILE_PURGE">파일 영구 삭제</option>
          <option value="FILE_RESTORE">파일 복원</option>
          <option value="FILE_MOVE">파일 이동</option>
          <option value="FILE_METADATA_UPDATE">파일 정보 수정</option>
          <option value="SHARE_CREATE">공유 생성</option>
          <option value="SHARE_REVOKE">공유 해지</option>
          <option value="FOLDER_CREATE">폴더 생성</option>
          <option value="FOLDER_UPDATE">폴더 수정</option>
          <option value="FOLDER_MOVE">폴더 이동</option>
        </select>
      </label>
      <label>
        대상
        <select id="targetType" class="input">
          <option value="">전체</option>
          <option value="FILE">파일</option>
          <option value="FOLDER">폴더</option>
          <option value="SHARE">공유</option>
        </select>
      </label>
      <label>
        사용자 ID
        <input id="actorUserId" class="input" type="text" placeholder="전체">
      </label>
      <label class="inline-control" id="allUsersWrap" hidden>
        <input id="allUsers" type="checkbox">
        전체 사용자
      </label>
      <button id="refreshAudit" class="btn" type="button">새로고침</button>
      <div id="auditSummary" class="summary"></div>
    </section>
    <section class="panel">
      <div id="auditList" class="management-list"></div>
      <button id="loadMoreAudit" class="btn wide-button" type="button">더 보기</button>
    </section>
  </main>
  <script src="/assets/js/webhard.js"></script>
  <script src="/assets/js/audit.js"></script>
</body>
</html>
