<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>웹하드 공유</title>
  <link rel="stylesheet" href="/assets/css/webhard.css">
</head>
<body>
  <main class="shell">
    <section class="panel">
      <h1>공유 파일</h1>
      <form id="shareAccessForm" class="form-grid">
        <label>
          비밀번호
          <input id="sharePassword" class="input" type="password" autocomplete="current-password">
        </label>
        <div class="actions">
          <button class="btn primary" type="submit">확인</button>
        </div>
      </form>
      <div id="shareMessage" class="message"></div>
    </section>
    <section class="panel">
      <div id="shareDetail" class="stat-list"></div>
    </section>
  </main>
  <script src="/assets/js/webhard.js"></script>
  <script src="/assets/js/share.js"></script>
</body>
</html>
