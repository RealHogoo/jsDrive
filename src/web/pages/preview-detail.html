<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>웹하드 상세 목록</title>
  <link rel="stylesheet" href="/assets/css/webhard.css">
</head>
<body>
  <header class="topbar">
    <strong>웹하드</strong>
    <nav>
      <a href="/upload.html">업로드</a>
      <a class="active" href="/preview.html">미리보기</a>
      <a href="/search.html">검색</a>
      <a href="/download-jobs.html">다운로드</a>
      <a href="/trash.html">휴지통</a>
      <a href="/indexing.html">인덱싱</a>
    </nav>
  </header>
  <main class="shell">
    <section class="panel toolbar">
      <a class="btn" href="/preview.html">목록으로</a>
      <a id="downloadWeek" class="btn" href="#">일괄 다운로드</a>
      <span id="downloadStatus" class="summary"></span>
    </section>

    <section class="panel feed-head">
      <h1 id="detailTitle">상세 목록</h1>
      <label>
        정렬 기준
        <select id="sortBasis" class="input">
          <option value="UPLOADED">업로드일시 기준</option>
          <option value="ORIGINAL_CREATED">원본 생성일 기준</option>
        </select>
      </label>
      <label>
        종류
        <select id="contentKind" class="input">
          <option value="ALL">전체</option>
          <option value="IMAGE">사진</option>
          <option value="VIDEO">동영상</option>
          <option value="DOCUMENT">문서</option>
        </select>
      </label>
      <div id="detailSummary" class="summary"></div>
    </section>

    <section class="panel">
      <div id="detailGrid" class="preview-grid detail-grid"></div>
      <div id="detailSentinel" class="feed-sentinel">불러오는 중입니다.</div>
    </section>
  </main>
  <script src="/assets/js/webhard.js"></script>
  <script src="/assets/js/preview-detail.js"></script>
</body>
</html>
