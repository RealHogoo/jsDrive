<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>웹하드 현황</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/assets/css/webhard.css">
</head>
<body>
  <header class="topbar">
    <strong>웹하드</strong>
    <nav>
      <a href="/upload.html">업로드</a>
      <a class="active" href="/dashboard.html">현황</a>
      <a href="/preview.html">미리보기</a>
      <a href="/search.html">검색</a>
      <a href="/download-jobs.html">다운로드</a>
      <a href="/trash.html">휴지통</a>
      <a href="/shares.html" data-permission="share">공유</a>
      <a href="/audit.html">기록</a>
      <a href="/indexing.html">인덱싱</a>
    </nav>
  </header>
  <main class="shell">
    <section class="panel feed-head">
      <h1>저장소 현황</h1>
      <button id="refreshDashboard" class="btn" type="button">새로고침</button>
      <div id="dashboardMessage" class="summary"></div>
    </section>
    <section id="summaryCards" class="metric-grid"></section>
    <section class="panel">
      <h2>종류별 사용량</h2>
      <div id="kindStats" class="stat-list"></div>
    </section>
    <section class="panel">
      <h2>사용자별 사용량</h2>
      <div id="ownerStats" class="stat-list"></div>
    </section>
    <section class="panel">
      <h2>최근 파일</h2>
      <div id="recentFiles" class="stat-list"></div>
    </section>
    <section class="panel">
      <h2>중복 파일</h2>
      <div id="duplicateGroups" class="stat-list"></div>
    </section>
  </main>
  <script src="/assets/js/webhard.js"></script>
  <script src="/assets/js/dashboard.js"></script>
</body>
</html>
